<!DOCTYPE html>
<!--
  ===========================================================================
  BibVania — login.html  |  Autenticação do Bibliotecário
  ===========================================================================
  PROPÓSITO
    Página de login. Protege o painel administrativo (admin.html).
    Não deve ser indexada por mecanismos de busca (robots: noindex).

  FLUXO DE AUTENTICAÇÃO
    1. Ao carregar: redirectIfLoggedIn() → se já há sessão ativa,
       redireciona imediatamente para admin.html sem exibir a tela.
    2. O body começa com visibility:hidden e só é exibido após a
       checagem assíncrona de sessão (elimina flash da tela de login
       para usuários já autenticados).
    3. No submit: signIn(email, password) → se sucesso, pré-popula
       localStorage com o nome do admin (bibvania_admin_nome) para
       evitar flash do nome no admin.html após redirect.
    4. Erros de rede são diferenciados de credenciais incorretas.

  SEGURANÇA
    • robots: noindex — página não aparece em buscas
    • autocomplete: username / current-password — suporte a gerenciadores
    • novalidate no <form> — validação controlada pelo script

  ACESSIBILIDADE
    • aria-required nos campos
    • aria-live="assertive" na div de erros (anuncia erro imediatamente)
    • Skip link para o formulário
  DEPENDÊNCIAS
    • bibcore.js (ES Module + UMD fallback)
    • style.css
  ===========================================================================
-->
<html lang="pt-BR">

<script>function navegarCom(url){window.location.href=url;}</script>
<script>
    // Aplicar tema antes do CSS carregar — elimina flash claro→escuro
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
    // Carrega VERSION.json de forma síncrona — garante BIBVANIA_VERSAO disponível imediatamente.
    (function(){
        try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'VERSION.json', false);
            xhr.send();
            if (xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                if (data && data.bibvania) {
                    window.BIBVANIA_VERSAO = data.bibvania;
                    document.querySelectorAll('meta[name="version"], meta[name="versaobase"]').forEach(function(m){
                        m.setAttribute('content', data.bibvania);
                    });
                    try {
                        document.dispatchEvent(new CustomEvent('bibvania:versao', { detail: { versao: data.bibvania } }));
                    } catch(_) {}
                }
            }
        } catch(_) {}
    })();
</script>

    <!--
    MÓDULO DO LOGIN (ES Module)
    Importa DB de bibcore.js. Responsável por:
      1. Verificar sessão existente e redirecionar se logado
      2. Aplicar preferências de tema
      3. Processar submit do formulário de login
    -->
    <script type="module">
        import DB from './bibcore.js';
        window.DB = DB;
        let fontSize = parseInt(localStorage.getItem('fontSize')) || 16; if (fontSize === 18) { fontSize = 16; localStorage.setItem('fontSize', 16); }

        

        window.toggleDarkMode = () => {
            const theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', theme);
            document.getElementById('darkModeBtn').innerText = theme === 'dark' ? '☀️' : '🌙';
            localStorage.setItem('theme', theme);
        };

        function aplicarPreferencias() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
            const btn = document.getElementById('darkModeBtn');
            if (btn) btn.innerText = savedTheme === 'dark' ? '☀️' : '🌙';
            document.documentElement.style.setProperty('--font-size', fontSize + 'px');
            
            const el = document.getElementById('nomeEscolaLogin');
            if (el) el.innerHTML = '<span>BIBLIOTECA ESCOLAR DA EMTI</span><span>PROFESSORA MARIA VÂNIA FARIAS LINHARES</span>';
        }

        (async () => {
            aplicarPreferencias();
            // Verifica sessão: se logado, redireciona para admin.html imediatamente.
            // Só revela o body se NÃO houver sessão (evita flash da tela de login).
            // Se veio do BibFiles já logado, só fechar a aba
            const _retornoParam = new URLSearchParams(window.location.search).get('retorno');
            if (_retornoParam === 'bibfiles') {
                const _sess = await window.DB.getSession();
                if (_sess) { navegarComTransicao('bibfiles.html'); return; }
            } else {
                await window.DB.redirectIfLoggedIn();
            }
            // Só revela se não foi redirecionado (sem sessão ativa)
            document.body.style.visibility = 'visible';
        })();

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('loginError');
            
            errorDiv.innerText = "AUTENTICANDO...";
            
            try {
                const loginData = await window.DB.signIn(email, password);
                // Pré-popular localStorage com nome do admin ANTES do redirect.
                // O script inline de admin.html lê bibvania_admin_nome para exibir
                // o nome do usuário imediatamente, sem esperar o módulo ES carregar.
                // Pré-popular cache de perfil ANTES de redirecionar —
                // evita piscar de botão no admin.html (script inline lê este valor)
                try {
                    const userId = loginData?.user?.id;
                    if (userId) {
                        const { data: adminData } = await window.DB.supabase
                            .from('admins')
                            .select('nome')
                            .eq('id', userId)
                            .maybeSingle();
                        if (adminData?.nome) {
                            localStorage.setItem('bibvania_admin_nome', adminData.nome);
                        } else {
                            localStorage.removeItem('bibvania_admin_nome');
                        }
                    }
                } catch(_) { localStorage.removeItem('bibvania_admin_nome'); }
                // Se veio do BibFiles, fechar aba; senão redirecionar pro admin
                const _retorno = new URLSearchParams(window.location.search).get('retorno');
                if (_retorno === 'bibfiles') {
                    navegarComTransicao('bibfiles.html');
                } else {
                    navegarCom('admin.html');
                }
            } catch (error) {
                const isRede = error instanceof TypeError || (error.message || '').toLowerCase().includes('fetch') || (error.message || '').toLowerCase().includes('network');
                errorDiv.innerText = isRede
                    ? '📶 Internet instável? Verifique sua conexão e tente novamente.'
                    : '❌ E-MAIL OU SENHA INCORRETOS.';
            }
        });
    </script>

        if(img && iconLink && iconLink.href) img.src = iconLink.href;

    function toggleMenuAtalhos(){
        var m=document.getElementById('menuAtalhos');
        var aberto=m.classList.toggle('aberto');
        m.querySelector('.menu-atalhos-btn').setAttribute('aria-expanded', aberto);
    }
    function fecharMenuAtalhos(){
        var m=document.getElementById('menuAtalhos');
        m.classList.remove('aberto');
        m.querySelector('.menu-atalhos-btn').setAttribute('aria-expanded','false');
    }
    document.addEventListener('click',function(e){
        if (e._leitorInteragir) return; /* ignora cliques sintéticos do BibSpeech */
        if (e.target.closest && e.target.closest('#leitorInteragirPopup')) return; /* ignora cliques no popup do BibSpeech */
        var m=document.getElementById('menuAtalhos');
        if(m&&!m.contains(e.target)) fecharMenuAtalhos();
    });
    document.addEventListener('keydown',function(e){if(e.key==='Escape') fecharMenuAtalhos();});
    </script>

</div>
<script>
(function(){
    function _esconderOverlays() {
        var el = document.getElementById('navTransicaoOverlay');
        if (el) { el.style.display = 'none'; el.setAttribute('aria-hidden', 'true'); }
    }
    window.navegarComTransicao = function(url) {
        var overlay = document.getElementById('navTransicaoOverlay');
        if (!overlay) { window.location.href = url; return; }
        overlay.style.display = 'flex';
        overlay.setAttribute('aria-hidden', 'false');
        setTimeout(function(){ window.location.href = url; }, 600);
    };
    // Antes de o bfcache congelar a página, esconde os overlays
    window.addEventListener('pagehide', _esconderOverlays);
    // Caso o navegador restaure do bfcache mesmo assim
    window.addEventListener('pageshow', function(e) {
        if (e.persisted) _esconderOverlays();
    });
    // Elevar navegarCom para usar transição após DOM pronto
    document.addEventListener('DOMContentLoaded', function() {
        if (window.navegarComTransicao) window.navegarCom = window.navegarComTransicao;
    });
})();
</script>
