<!DOCTYPE html>
<!--
  ===========================================================================
  BibVania — acervo.html  |  Lista Completa do Acervo
  ===========================================================================
  PROPÓSITO
    Página pública (robots: noindex) que exibe todos os livros do acervo
    em tabela, com busca textual e exportação em PDF. Acessível a partir
    do link "↗ VER ACERVO COMPLETO" na index.html (abre em nova aba).

  FUNCIONALIDADES
    • Tabela com colunas: #, Título, Autor, ISBN, Categoria, Prateleira,
      Palavras-chave, Capa (link), PDF (link), Alt Text, Qtd, Disp.,
      Cadastro, Edição
    • Busca textual em tempo real (filtra por título, autor, ISBN, categoria)
    • Lightbox ao clicar em capa (foco trap + Escape para fechar)
    • Exportação via pdfMake (CDN) — landscape, paginada
    • Modo escuro (localStorage)

  FLUXO DE INICIALIZAÇÃO
    1. Script inline HEAD aplica tema e carrega VERSION.json via XHR síncrono
    2. DOMContentLoaded → conecta Supabase → busca todos os livros
    3. Renderiza lista de texto (não tabela); campo de busca filtra via JS sem nova requisição

  DEPENDÊNCIAS
    • bibcore.js (ES Module — DB para busca de livros)
    • style.css
    • pdfMake — CDN (exportação PDF)
  ===========================================================================
-->
<html lang="pt-BR">
<head>

<script>function navegarCom(url){window.location.href=url;}</script>
<script>
    (function(){var t=localStorage.getItem('theme');if(t)document.documentElement.setAttribute('data-theme',t);})();
    (function(){
        try {
            var xhr = new XMLHttpRequest();
            xhr.open('GET', 'VERSION.json', false);
            xhr.send();
            if (xhr.status === 200) {
                var data = JSON.parse(xhr.responseText);
                if (data && data.bibvania) {
                    window.BIBVANIA_VERSAO = data.bibvania;
                }
            }
        } catch(_) {}
    })();
</script>

<style>

    .btn-outline{background:var(--card);border:1px solid var(--border);color:var(--text)}
    .accessibility-bar{position:fixed;top:0.6rem;left:50%;transform:translateX(-50%);width:auto;max-width:calc(100% - 2rem);height:44px;display:flex;justify-content:center;align-items:center;padding:0 1rem;z-index:1000;gap:0.5rem;border-radius:999px;box-shadow:0 4px 16px rgba(0,0,0,0.18);background:rgba(37,99,235,0.75)}
    .control-btn{background:rgba(255,255,255,.2);border:none;color:#fff;width:36px;height:36px;border-radius:8px;cursor:pointer;font-weight:700;font-size:0.9rem;touch-action:manipulation;-webkit-tap-highlight-color:transparent;user-select:none;}

    /* Layout */
    header{text-align:center;padding:5rem 1rem 1.5rem;background:var(--card);border-bottom:3px solid var(--primary);}
    .header-logo{width:80px;height:80px;object-fit:contain;margin-bottom:0.5rem;}
    header h1{font-size:1.4rem;font-weight:900;color:var(--primary);letter-spacing:0.05em;}
    .school-name{font-size:0.75rem;font-weight:700;color:var(--text-light);margin-top:0.25rem;display:flex;flex-direction:column;gap:0.1rem;}

    .card{background:var(--card);border-radius:var(--radius);padding:1rem;margin-bottom:1rem;border:1px solid var(--border);}
    .form-group{margin-bottom:0.75rem;}
    .form-group label{display:block;font-size:0.75rem;font-weight:700;color:var(--text-light);margin-bottom:0.4rem;}

    /* Toolbar */

    .item-acervo .item-campo{color:var(--text-light);margin-top:0.25rem;display:flex;flex-direction:column;gap:0.15rem;}

    .col-disp{width:80px;text-align:center;}
    .tag-link{color:var(--primary);cursor:pointer;text-decoration:underline;font-size:0.75rem;}
    .capa-link{color:var(--primary);cursor:pointer;text-decoration:underline;font-size:0.75rem;word-break:break-all;}
    .disponivel-ok{color:var(--success);font-weight:700;}
    .disponivel-no{color:var(--danger);font-weight:700;}
    .status-box{text-align:center;padding:2rem;color:var(--text-light);font-size:1rem;width:100%;}

    /* Overlay de download */
    .download-overlay{display:none;position:fixed;inset:0;z-index:10000;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);}
    .download-overlay.open{display:flex;}
    body.download-ativo{overflow:hidden;touch-action:none;}
    .download-box{background:var(--card);border-radius:16px;padding:2rem 2.5rem;display:flex;flex-direction:column;align-items:center;gap:1rem;box-shadow:0 8px 32px rgba(0,0,0,0.4);min-width:220px;}
    .download-spinner{width:44px;height:44px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    .download-label{font-size:0.9rem;font-weight:700;color:var(--text);text-align:center;}


    .lightbox-overlay{display:none;position:fixed;inset:0;z-index:9999;flex-direction:column;align-items:center;justify-content:center;}
    .lightbox-overlay.open{display:flex;}
    .lightbox-bg{position:absolute;inset:0;background:rgba(0,0,0,0.85);}

    /* Menu atalhos */

    .menu-atalhos-btn{background:rgba(255,255,255,.2);border:none;color:#fff;height:36px;padding:0 0.6rem;border-radius:8px;cursor:pointer;font-size:0.85rem;display:flex;align-items:center;gap:0.3rem;white-space:nowrap;}
    .menu-atalhos-lista{display:none;position:absolute;top:calc(100% + 8px);left:0;background:var(--card);border:1px solid var(--border);border-radius:10px;min-width:180px;box-shadow:0 8px 24px rgba(0,0,0,0.15);z-index:2000;overflow:hidden;}
    .menu-atalhos-lista.open{display:block;}
    .menu-atalhos-item{display:flex;align-items:center;gap:0.5rem;width:100%;padding:0.65rem 1rem;border:none;background:none;color:var(--text);font-size:0.85rem;cursor:pointer;text-align:left;font-weight:600;}
    .menu-atalhos-item:hover{background:var(--bg);}
    .menu-atalhos-item-emoji{font-size:1rem;}
    .skip-link{position:absolute;left:-9999px;top:0;}.skip-link:focus{left:1rem;top:1rem;z-index:9999;}
    .sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);}
</style>

    <div class="container">

        <div class="download-box">
            <div class="download-spinner"></div>
            <div class="download-label">⬇ GERANDO PDF...<br><span style="font-weight:400;font-size:0.75rem;color:var(--text-light)">Aguarde um momento</span></div>

    <!-- pdfmake CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.9/pdfmake.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdfmake/0.2.9/vfs_fonts.min.js"></script>

    <script type="module">
        import DB, { iniciarBuscaVoz } from './bibcore.js';

        // ── Estado ────────────────────────────────────────────────────────────
        let _todos = [];
        let _filtrados = [];

        // ── Helpers ───────────────────────────────────────────────────────────
        function fmtData(val) {
            if (!val) return '';
            try {
                const d = new Date(val);
                return d.toLocaleDateString('pt-BR');
            } catch { return val; }
        }
        function esc(str) {
            return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        // ── Renderização ──────────────────────────────────────────────────────
        function renderizar(livros) {
            const lista = document.getElementById('listaAcervo');
            if (!livros.length) {
                lista.innerHTML = '<div class="item-acervo status-box">NENHUM LIVRO ENCONTRADO.</div>';
                document.getElementById('acervoCount').textContent = '0 LIVROS';
                return;
            }
            const itens = livros.map(l => {
                const capaHtml = l.imagem_url
                    ? `<a class="capa-link" href="#" data-lightbox-url="${esc(l.imagem_url)}" data-lightbox-titulo="${esc(l.titulo)}" onclick="abrirLightboxUrl(this);return false;">[VER CAPA]</a>`
                    : '';
                const pdfHtml = l.pdf_url
                    ? `<a class="tag-link" href="${esc(l.pdf_url)}" target="_blank" rel="noopener">[BAIXAR LIVRO]</a>`
                    : null;
                // data-busca: campo pré-computado para filtro rápido
                const busca = [
                    l.titulo || '',
                    l.autor || '',
                    l.isbn || '',
                    l.categoria || '',
                    l.prateleira || '',
                    (l.palavras_chave || []).join(' ')
                ].join('§').toLowerCase();

                const linhas = [];
                linhas.push(`<strong>Autor:</strong> ${l.autor ? esc(l.autor) : ''}`);
                linhas.push(`<strong>ISBN:</strong> ${l.isbn ? esc(l.isbn) : ''}`);
                linhas.push(`<strong>Categoria:</strong> ${l.categoria ? esc(l.categoria) : ''}`);
                linhas.push(`<strong>Prateleira:</strong> ${l.prateleira ? esc(l.prateleira) : ''}`);
                linhas.push(`<strong>Palavra-chave:</strong> ${(l.palavras_chave && l.palavras_chave.length) ? esc(l.palavras_chave.join(', ')) : ''}`);
                linhas.push(`<strong>Qtd:</strong> ${esc(l.quantidade_total)}`);
                linhas.push(`<strong>Cadastro:</strong> ${l.data_cadastro ? fmtData(l.data_cadastro) : ''}`);
                linhas.push(`<strong>Capa:</strong> ${capaHtml}`);
                linhas.push(`<strong>Download:</strong> ${pdfHtml ? pdfHtml : ''}`);

                return `<div class="item-acervo" data-busca="${esc(busca)}">
                    <span class="item-titulo">${esc(l.titulo)}</span> <span class="item-id">(#${esc(l.id)})</span>
                    <div class="item-campo">${linhas.map(li => `<div>${li}</div>`).join('')}</div>
                </div>`;
            }).join('');
            lista.innerHTML = itens;
            const total = livros.length;
            document.getElementById('acervoCount').textContent =
                total + ' LIVRO' + (total !== 1 ? 'S' : '');
            document.getElementById('btnBaixarPdf').disabled = false;
        }

        // ── Filtro ────────────────────────────────────────────────────────────
        let _debounceTimer = null;

        function _executarFiltro() {
            const q = document.getElementById('buscaAcervo').value.trim().toLowerCase();
            const itens = document.getElementById('listaAcervo').querySelectorAll('.item-acervo[data-busca]');
            let visiveis = 0;
            itens.forEach(item => {
                const match = !q || item.dataset.busca.includes(q);
                item.style.display = match ? '' : 'none';
                if (match) visiveis++;
            });
            document.getElementById('acervoCount').textContent =
                visiveis + ' LIVRO' + (visiveis !== 1 ? 'S' : '');
            const bc = document.getElementById('buscaCount');
            if (bc) bc.textContent = q ? visiveis + ' resultado' + (visiveis !== 1 ? 's' : '') : '';
            _filtrados = q
                ? _todos.filter(l => {
                    const busca = [l.titulo||'',l.autor||'',l.isbn||'',l.categoria||'',l.prateleira||'',(l.palavras_chave||[]).join(' ')].join('\u00a7').toLowerCase();
                    return busca.includes(q);
                })
                : _todos.slice();
        }

        window.filtrarTabela = function() {
            clearTimeout(_debounceTimer);
            if (!document.getElementById('buscaAcervo').value.trim()) {
                // Campo vazio: sem debounce, mas adiado ao próximo frame para não travar
                // a digitação (reflow de reexibir todos os itens é o caso mais pesado).
                requestAnimationFrame(_executarFiltro);
            } else {
                _debounceTimer = setTimeout(_executarFiltro, 150);
            }
        };

        // ── PDF ───────────────────────────────────────────────────────────────
        window.baixarPdf = function() {
            const livros = _filtrados.length ? _filtrados : _todos;
            if (!livros.length) return;

            const nomeEscola = document.getElementById('nomeEscolaExibicao')?.innerText?.replace(/\n/g, ' ') || 'Biblioteca Escolar';
            const agora = new Date().toLocaleDateString('pt-BR') + ' ' + new Date().toLocaleTimeString('pt-BR', {hour:'2-digit', minute:'2-digit'});
            const totalTitulos = _todos.length;
            const totalExibidos = livros.length;
            const linkIndex = 'https://emtivania.github.io/bibvania/';

            // Converter logo para base64
            function buildPdf(logoDataUrl) {
                const cabecalho = ['ID', 'TÍTULO', 'AUTOR', 'ISBN', 'CATEGORIA', 'PRATELEIRA', 'PALAVRA-CHAVE', 'CAPA (URL)', 'DOWNLOAD', 'QTD', 'CADASTRO'];

                const linhas = livros.map(l => [
                    String(l.id || ''),
                    l.titulo || '',
                    l.autor || '',
                    l.isbn || '',
                    l.categoria || '',
                    l.prateleira || '',
                    (l.palavras_chave || []).join(', '),
                    l.imagem_url ? { text: '[VER CAPA]', link: l.imagem_url, color: '#2563eb', decoration: 'underline', fontSize: 6 } : '',
                    l.pdf_url    ? { text: '[BAIXAR LIVRO]', link: l.pdf_url, color: '#2563eb', decoration: 'underline', fontSize: 6 } : '',
                    String(l.quantidade_total ?? ''),
                    l.data_cadastro ? new Date(l.data_cadastro).toLocaleDateString('pt-BR') : '',
                ]);

                const widths = [25, 100, 80, 60, 70, 60, 80, 80, 80, 25, 50];

                // Bloco de cabeçalho do documento (logo centralizada + info centralizada)
                const headerContent = [];
                const infoStack = [
                    { text: nomeEscola, fontSize: 9, bold: true, color: '#1e293b', alignment: 'center', margin: [0, 0, 0, 2] },
                    { text: 'ACERVO COMPLETO — ' + agora, fontSize: 7, color: '#64748b', alignment: 'center' },
                    { text: totalExibidos + ' título(s) exibidos  |  Total no acervo: ' + totalTitulos, fontSize: 7, color: '#2563eb', bold: true, alignment: 'center' },
                    { text: linkIndex, fontSize: 6, color: '#2563eb', decoration: 'underline', link: linkIndex, alignment: 'center' },
                ];
                if (logoDataUrl) {
                    headerContent.push({
                        stack: [
                            { image: logoDataUrl, width: 48, alignment: 'center', margin: [0, 0, 0, 6] },
                            ...infoStack,
                        ],
                        margin: [20, 10, 20, 8]
                    });
                } else {
                    headerContent.push({
                        stack: infoStack,
                        margin: [20, 10, 20, 8]
                    });
                }

                const docDef = {
                    pageOrientation: 'landscape',
                    pageMargins: [20, 20, 20, 30],
                    footer: (page, pages) => ({
                        text: 'Página ' + page + ' de ' + pages + '  |  BibVania',
                        fontSize: 6,
                        color: '#94a3b8',
                        alignment: 'center',
                        margin: [0, 0, 0, 10]
                    }),
                    content: [
                        ...headerContent,
                        { text: ' ', fontSize: 4 },
                        {
                            table: {
                                headerRows: 1,
                                widths: widths,
                                body: [
                                    cabecalho.map(h => ({
                                        text: h,
                                        fontSize: 6,
                                        bold: true,
                                        fillColor: '#2563eb',
                                        color: '#ffffff',
                                    })),
                                    ...linhas.map((row, i) => row.map(cell => {
                                        const base = { fontSize: 6, color: '#1e293b', fillColor: i % 2 === 0 ? '#f8fafc' : '#ffffff' };
                                        if (typeof cell === 'object' && cell !== null) return { ...base, ...cell };
                                        return { ...base, text: cell };
                                    }))
                                ]
                            },
                            layout: {
                                hLineWidth: () => 0.3,
                                vLineWidth: () => 0.3,
                                hLineColor: () => '#e2e8f0',
                                vLineColor: () => '#e2e8f0',
                                paddingLeft: () => 3,
                                paddingRight: () => 3,
                                paddingTop: () => 2,
                                paddingBottom: () => 2,
                            }
                        }
                    ]
                };

                pdfMake.createPdf(docDef).getBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'acervo-bibvania-' + agora.replace(/[/:]/g, '-') + '.pdf';
                    document.body.appendChild(a);
                    a.click();
                    setTimeout(() => {
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                        document.getElementById('downloadOverlay').classList.remove('open');
                        document.body.classList.remove('download-ativo');
                    }, 500);
                });
            }

            // Tentar carregar logo como base64
            document.getElementById('downloadOverlay').classList.add('open');
            document.body.classList.add('download-ativo');
            try {
                const img = new Image();
                img.crossOrigin = 'anonymous';
                img.onload = function() {
                    try {
                        const canvas = document.createElement('canvas');
                        canvas.width = img.naturalWidth;
                        canvas.height = img.naturalHeight;
                        canvas.getContext('2d').drawImage(img, 0, 0);
                        buildPdf(canvas.toDataURL('image/png'));
                    } catch(_) { buildPdf(null); }
                };
                img.onerror = function() { buildPdf(null); };
                img.src = 'logo.png?' + Date.now();
            } catch(_) {
                buildPdf(null);
            }
        };

        // ── Lightbox ──────────────────────────────────────────────────────────
        window.abrirLightboxUrl = function(el) {
            const url = el.dataset.lightboxUrl;
            const titulo = el.dataset.lightboxTitulo || '';
            if (!url) return;
            const lb = document.getElementById('capLightbox');
            document.getElementById('capLightboxImg').src = url;
            document.getElementById('capLightboxImg').alt = 'Capa ampliada: ' + titulo;
            document.getElementById('capLightboxTitle').textContent = titulo;
            lb._opener = el;
            lb.classList.add('open');
            setTimeout(() => { const btn = lb.querySelector('.lightbox-back'); if (btn) btn.focus(); }, 50);
        };

        // ── Carregar ──────────────────────────────────────────────────────────
        async function carregar() {
            try {
                _todos = await DB.getLivros();
                _todos.sort((a, b) => (a.titulo || '').localeCompare(b.titulo || '', 'pt-BR', {sensitivity: 'base'}));
                _filtrados = _todos;
                renderizar(_todos);
            } catch(e) {
                document.getElementById('listaAcervo').innerHTML =
                    '<div class="item-acervo status-box">ERRO AO CARREGAR ACERVO.</div>';
                document.getElementById('acervoCount').textContent = 'ERRO';
            }
        }

        // Cria botão "✕" dentro do campo de busca. Aparece quando há texto; limpa o input e aciona onClear ao clicar.
        function _iniciarBotaoLimpar(inputEl, onClear) {
            const wrap = inputEl.parentElement;
            const btn = document.createElement('button');
            btn.type = 'button';
            btn.className = 'clear-btn';
            btn.setAttribute('aria-label', 'Limpar busca');
            btn.title = 'Limpar';
            btn.innerHTML = '✕';
            btn.style.display = 'none';
            wrap.appendChild(btn);
            const atualizar = () => { btn.style.display = inputEl.value ? 'flex' : 'none'; };
            inputEl.addEventListener('input', atualizar);
            btn.addEventListener('click', () => { inputEl.value = ''; atualizar(); onClear(); });
        }

        // Busca por voz e botão de limpar no campo de busca do acervo
        iniciarBuscaVoz(document.getElementById('buscaAcervo'), () => filtrarTabela());
        _iniciarBotaoLimpar(document.getElementById('buscaAcervo'), () => filtrarTabela());

        // Garante que apagar o último caractere (e limpar via ✕ nativo) sempre dispare o filtro.
        // input[type=search] no Chrome/Safari dispara o evento 'search' ao usar o ✕ nativo,
        // mas não dispara 'input', causando travamento visual quando o campo fica vazio.
        document.getElementById('buscaAcervo').addEventListener('search', () => filtrarTabela());

        // Fallback para teclados Android/WebView que às vezes não disparam 'input' ao apagar
        // o último caractere com Backspace/Delete — sem isso o filtro fica "travado" no
        // último resultado mesmo com o campo já vazio na tela.
        document.getElementById('buscaAcervo').addEventListener('keyup', (e) => {
            if ((e.key === 'Backspace' || e.key === 'Delete') && !e.target.value) {
                filtrarTabela();
            }
        });

        carregar();
    </script>

    <script>
        // Lightbox fechar
        function fecharLightbox() {
            const lb = document.getElementById('capLightbox');
            lb.classList.remove('open');
            if (lb._opener) { lb._opener.focus(); lb._opener = null; }
        }
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') {
                fecharLightbox();
            }
        });

        // Dark mode
        document.getElementById('darkModeBtn').addEventListener('click', function() {
            const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            this.innerText = newTheme === 'dark' ? '☀️' : '🌙';
            this.setAttribute('aria-pressed', String(newTheme === 'dark'));
        });

        // Menu atalhos
        function toggleMenuAtalhos() {
            const lista = document.querySelector('.menu-atalhos-lista');
            const btn   = document.querySelector('.menu-atalhos-btn');
            const open  = lista.classList.toggle('open');
            btn.setAttribute('aria-expanded', String(open));
        }
        function fecharMenuAtalhos() {
            document.querySelector('.menu-atalhos-lista').classList.remove('open');
            document.querySelector('.menu-atalhos-btn').setAttribute('aria-expanded', 'false');
        }
        document.addEventListener('click', e => {
            if (!e.target.closest('.menu-atalhos')) fecharMenuAtalhos();
        });

        function irParaAdmin() {
            const stored = localStorage.getItem('bibvania_user');
            if (stored) { try { if (JSON.parse(stored)?.id) { navegarCom('admin.html'); return; } } catch(_){} }
            navegarCom('login.html');
        }
        function abrirBibMaker() { window.open('bibmaker.html', '_blank'); }

        // Rodapé com versão
        (function(){
            const v = window.BIBVANIA_VERSAO;
            if (v) {
                const el = document.getElementById('rodapeTexto');
                if (el) el.innerHTML = el.innerHTML.replace('BibVania', 'BibVania v' + v);
            }
        })();
    </script>

    <script src="bibspeech_api.js"></script>
</body>
</html>
