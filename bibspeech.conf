# ============================================================
#  BibSpeech — Configuração de Pronúncia
# ============================================================
#
#  Este arquivo define como o BibSpeech deve pronunciar
#  determinados termos ao usar a leitura de tela.
#
#  REGRAS GERAIS:
#  - Linhas começando com # são comentários e são ignoradas.
#  - Cada entrada ocupa uma linha: termo = pronúncia/arquivo
#  - O termo é case-insensitive (bibvania = BIBVANIA)
#  - Espaços ao redor do = são opcionais
#
# ------------------------------------------------------------
#  FORMAS DE PREENCHER
# ------------------------------------------------------------
#
#  PRONÚNCIA TEXTUAL
#     O sistema lerá o texto exatamente como escrito.
#     Use acentos para guiar a pronúncia corretamente.
#
#     Formato:  termo = pronúncia
#     Exemplo:  bibvania = bibvânia
#
# ------------------------------------------------------------
#  LINGUAGEM
# ------------------------------------------------------------
#
#  Define o idioma usado pela leitura de tela.
#  Isso afeta a pronúncia geral do sistema, não apenas
#  os termos configurados abaixo.
#
#  Formato:  lang = código_do_idioma
#  Exemplos:
#    lang = pt_BR   (Português - Brasil)
#    lang = pt_PT   (Português - Portugal)
#    lang = en_US   (Inglês - Estados Unidos)
#    lang = es_ES   (Espanhol - Espanha)
#
# ------------------------------------------------------------
#  ATUALIZAÇÃO DA BIBLIOTECA
# ------------------------------------------------------------
#
#  As entradas abaixo são a base padrão do BibSpeech.
#  Na biblioteca gerada, você pode:
#    - Modificar qualquer entrada existente
#    - Adicionar novos termos
#
#  Em caso de atualização do sistema, as suas modificações
#  e adições serão preservadas. Se um mesmo termo existir
#  na base do BibVania e na sua biblioteca, será mantida
#  a versão da sua biblioteca.
#
# ============================================================
#  LINGUAGEM
# ============================================================

lang = pt_BR

# ============================================================
#  PRONÚNCIAS
# ============================================================

bibvania = bibvânia
logo = lôgo
github = guitirrâbe
